name: update
on:
  workflow_dispatch:
    inputs:
      full_sync:
        description: "Force full sync of all versions to D1"
        required: false
        default: "false"
        type: boolean
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: update
  cancel-in-progress: false

permissions:
  contents: write

env:
  GITHUB_API_TOKEN: ${{ secrets.MISE_GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.MISE_GITHUB_TOKEN }}
  TOKEN_MANAGER_URL: https://mise-tools.jdx.dev
  TOKEN_MANAGER_SECRET: ${{ secrets.TOKEN_MANAGER_SECRET }}
  DRY_RUN: 0
  # Disable mise's versions host: this workflow IS what populates it, so
  # reading from it would create a self-referential cache where any bad
  # entry (e.g. a version added without metadata after a GitHub rate limit)
  # gets re-ingested on the next run instead of being corrected from upstream.
  MISE_USE_VERSIONS_HOST: "false"
  # Include pre-release versions globally so the JSON output of
  # `mise ls-remote --json` carries `prerelease = true` for tags upstream
  # has flagged as pre-releases. Without this, mise filters them out before
  # emitting JSON and the rendered TOML never gets the new `prerelease`
  # field that scripts/generate-toml.js plumbs through (#135). Requires
  # mise >= the release containing jdx/mise#9415.
  MISE_PRERELEASES: "1"
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - run: curl https://mise.run | MISE_INSTALL_PATH="$HOME/.local/share/mise/bin/mise" sh && mise --version
      - run: npm install
      - run: ./scripts/update.sh "${{ github.event.schedule }}"
        env:
          PARALLEL_FETCHES: "8"
      - run: git checkout docs && git clean -df docs
      - name: Sync tools to D1
        run: node scripts/sync-to-d1.js
        env:
          SYNC_API_URL: https://mise-tools.jdx.dev
          API_SECRET: ${{ secrets.TOKEN_MANAGER_SECRET }}
      - name: Sync versions to D1
        run: node scripts/sync-versions-to-d1.js
        env:
          SYNC_API_URL: https://mise-tools.jdx.dev
          API_SECRET: ${{ secrets.TOKEN_MANAGER_SECRET }}
          FULL_SYNC: ${{ inputs.full_sync || 'false' }}
      - name: Push committed versions
        run: |
          git fetch origin main
          if [ "$(git rev-list --count origin/main..HEAD)" -gt 0 ]; then
            git pull --autostash --rebase origin main
            git push
          else
            echo "No local commits to push"
          fi
